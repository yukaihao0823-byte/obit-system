<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — 電子訃聞管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(145deg, #0e1828 0%, #1a2744 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  width: 100%; max-width: 380px;
  padding: 40px 36px 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo-icon { font-size: 40px; display: block; margin-bottom: 12px; }
.logo-title {
  font-family: 'Noto Serif TC', serif;
  color: #d4b07a; font-size: 20px; letter-spacing: 4px;
}
.logo-sub { color: rgba(255,255,255,0.3); font-size: 12px; letter-spacing: 2px; margin-top: 4px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 12px 14px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: rgba(255,255,255,0.9);
  font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
  outline: none;
}
.field input:focus { border-color: #b8965a; }
.btn-login {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #b8965a, #9a7840);
  color: #1a2744; border: none; border-radius: 10px;
  font-family: 'Noto Serif TC', serif; font-size: 15px;
  font-weight: 700; letter-spacing: 3px; cursor: pointer;
  margin-top: 8px; margin-bottom: 14px;
}
.divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 14px; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
.divider span { font-size: 11px; color: rgba(255,255,255,0.2); }
.btn-google {
  width: 100%; padding: 12px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: rgba(255,255,255,0.8);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.error {
  background: rgba(200,60,60,0.15);
  border: 1px solid rgba(200,60,60,0.3);
  border-radius: 8px; padding: 10px 14px;
  color: #ff9090; font-size: 12px; letter-spacing: 1px;
  margin-bottom: 14px; display: none;
}
.error.show { display: block; }
.note { text-align: center; margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🕊️</span>
    <div class="logo-title">電子訃聞系統</div>
    <div class="logo-sub">員工登入</div>
  </div>
  <div class="error" id="err"></div>
  <div class="field">
    <label>電子郵件</label>
    <input type="email" id="email" placeholder="your@email.com">
  </div>
  <div class="field">
    <label>密碼</label>
    <input type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn-login" onclick="login()">登　入</button>
  <div class="divider"><span>或</span></div>
  <button class="btn-google" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    使用 Google 帳號登入
  </button>
  <div class="note">僅限公司授權員工使用</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfg = document.createElement('script');
cfg.src = 'firebase-config.js';
document.head.appendChild(cfg);
await new Promise(r => cfg.onload = r);

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const gp   = new GoogleAuthProvider();

onAuthStateChanged(auth, u => { if (u) location.href = 'admin.html'; });

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
}

window.login = async function() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  if (!email || !pass) { showErr('請填寫電子郵件與密碼'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    location.href = 'admin.html';
  } catch(e) {
    const m = {'auth/invalid-credential':'帳號或密碼錯誤','auth/user-not-found':'找不到此帳號','auth/wrong-password':'密碼錯誤'};
    showErr(m[e.code] || '登入失敗：' + e.message);
  }
};

window.loginGoogle = async function() {
  try {
    await signInWithPopup(auth, gp);
    location.href = 'admin.html';
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showErr('Google 登入失敗，請再試一次');
  }
};
</script>
</body>
</html>
