<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

/* ── Body gradient backgrounds ── */
body.t-white        { background: linear-gradient(160deg,#f0ede6,#e0ddd6,#d0cdc6); }
body.t-sakura       { background: linear-gradient(160deg,#f8e8ec,#f0d0d8,#e0b8c4); }
body.t-rose         { background: linear-gradient(160deg,#f5e8e0,#ead0c0,#d8b8a8); }
body.t-buddha_gold  { background: linear-gradient(160deg,#f5edd0,#e8d898,#d4be70); }
body.t-buddha_pink  { background: linear-gradient(160deg,#fce8ec,#f4d0d8,#e8b8c4); }
body.t-indigo       { background: linear-gradient(160deg,#1a2030,#252c40,#101828); }
body.t-cross_blue   { background: linear-gradient(160deg,#dce8f8,#c0d8f0,#a0c0e8); }
body.t-cross_violet { background: linear-gradient(160deg,#ede8f8,#d8d0f0,#c0b8e8); }
body.t-ocean        { background: linear-gradient(160deg,#e0eef8,#c8ddf0,#a8cce8); }
body.t-lavender     { background: linear-gradient(160deg,#f0ecf8,#e0d8f0,#ccc0e8); }
body.t-night        { background: linear-gradient(160deg,#060c18,#0a1428,#040a18); }
body.t-ink          { background: linear-gradient(160deg,#e8e8e4,#d8d8d0,#c8c8bc); }
body.t-pine         { background: linear-gradient(160deg,#e4eae0,#d0dac8,#bccab0); }
body.t-autumn       { background: linear-gradient(160deg,#f5ede0,#e8d8c0,#d8c0a0); }

.wrap { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Hero: real image background ── */
.hero {
  height: 185px; position: relative; overflow: hidden; flex-shrink: 0;
  background-size: cover; background-position: center top; background-color: #1a2030;
}
.t-white        .hero { background-image: url('bg_white.png'); }
.t-sakura       .hero { background-image: url('bg_sakura.png'); }
.t-rose         .hero { background-image: url('bg_rose.png'); }
.t-buddha_gold  .hero { background-image: url('bg_buddha_gold.png'); }
.t-buddha_pink  .hero { background-image: url('bg_buddha_pink.png'); }
.t-indigo       .hero { background-image: url('bg_indigo.png'); }
.t-cross_blue   .hero { background-image: url('bg_cross_blue.png'); }
.t-cross_violet .hero { background-image: url('bg_cross_violet.png'); }
.t-ocean        .hero { background-image: url('bg_ocean.png'); }
.t-lavender     .hero { background-image: url('bg_lavender.png'); }
.t-night        .hero { background-image: url('bg_night.png'); }
.t-ink          .hero { background-image: url('bg_ink.png'); }
.t-pine         .hero { background-image: url('bg_pine.png'); }
.t-autumn       .hero { background-image: url('bg_autumn.png'); }

/* Gradient overlay — ensures title text always readable */
.hero::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.08) 50%, transparent 100%);
}
.hero-body {
  position: absolute; inset: 0;
  padding: 0 24px 52px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; z-index: 1;
}
.hero-title {
  font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700;
  letter-spacing: 4px; color: white; text-shadow: 0 2px 12px rgba(0,0,0,0.55);
  line-height: 1.4;
}
.hero-sub {
  font-size: 12px; letter-spacing: 3px; margin-top: 5px;
  color: rgba(255,255,255,0.88); text-shadow: 0 1px 6px rgba(0,0,0,0.4);

/* ── Photo ring ── */
.photo-wrap {
  display: flex; justify-content: center;
  margin-top: -80px; z-index: 10; position: relative; margin-bottom: 8px;
}
.photo-ring {
  width: 160px; height: 200px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 12px 40px rgba(0,0,0,0.22);
  display: flex; align-items: flex-end; justify-content: center;
  background: transparent;
}
/* Fade out bottom edge naturally into page background */
.photo-ring::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 56px;
  z-index: 2; pointer-events: none;
}
/* Each theme fades into its own body bg color */
.t-white        .photo-ring::after { background: linear-gradient(to bottom, transparent, #e0ddd6); }
.t-sakura       .photo-ring::after { background: linear-gradient(to bottom, transparent, #f0d0d8); }
.t-rose         .photo-ring::after { background: linear-gradient(to bottom, transparent, #ead0c0); }
.t-buddha_gold  .photo-ring::after { background: linear-gradient(to bottom, transparent, #e8d898); }
.t-buddha_pink  .photo-ring::after { background: linear-gradient(to bottom, transparent, #f4d0d8); }
.t-indigo       .photo-ring::after { background: linear-gradient(to bottom, transparent, #252c40); }
.t-cross_blue   .photo-ring::after { background: linear-gradient(to bottom, transparent, #c0d8f0); }
.t-cross_violet .photo-ring::after { background: linear-gradient(to bottom, transparent, #d8d0f0); }
.t-ocean        .photo-ring::after { background: linear-gradient(to bottom, transparent, #c8ddf0); }
.t-lavender     .photo-ring::after { background: linear-gradient(to bottom, transparent, #e0d8f0); }
.t-night        .photo-ring::after { background: linear-gradient(to bottom, transparent, #0a1428); }
.t-ink          .photo-ring::after { background: linear-gradient(to bottom, transparent, #d8d8d0); }
.t-pine         .photo-ring::after { background: linear-gradient(to bottom, transparent, #d0dac8); }
.t-autumn       .photo-ring::after { background: linear-gradient(to bottom, transparent, #e8d8c0); }

.photo-ring img {
  width: 100%; height: 100%;

<body class="t-night">

<div class="loading" id="ls"><div style="font-size:30px">🕊️</div><p>載入中</p></div>
<div class="wrap" id="wrap" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = document.createElement('script');
cfg.src = 'firebase-config.js';
document.head.appendChild(cfg);
await new Promise(r => cfg.onload = r);

const app  = initializeApp(FIREBASE_CONFIG);
const db   = getFirestore(app);
const ls   = document.getElementById('ls');
const wrap = document.getElementById('wrap');

// Firestore theme key → CSS body class
const THEMES = {
  white:'t-white', sakura:'t-sakura', rose:'t-rose',
  buddha_gold:'t-buddha_gold', buddha_pink:'t-buddha_pink',
  indigo:'t-indigo', cross_blue:'t-cross_blue', cross_violet:'t-cross_violet',
  ocean:'t-ocean', lavender:'t-lavender', night:'t-night',
  ink:'t-ink', pine:'t-pine', autumn:'t-autumn',
};

const id = new URLSearchParams(location.search).get('id');
if (!id) {
  showErr('找不到訃聞','請確認連結是否正確');
} else {
  try {
    const snap = await getDoc(doc(db,'cases',id));
    ls.style.display = 'none';
    wrap.style.display = 'flex';
    if (!snap.exists()) { showErr('此訃聞不存在','連結可能已失效'); }
    else { render({ id, ...snap.data() }); }
  } catch(e) { showErr('載入失敗', e.message); }
}

function showErr(title, msg) {
  ls.style.display='none'; wrap.style.display='flex';
  wrap.innerHTML='<div class="err-wrap"><div style="font-size:46px">🕊️</div><h2>'+title+'</h2><p>'+msg+'</p></div>';
}

function render(c) {
  const tc = THEMES[c.theme] || 't-night';
  document.body.className = tc;

  // 動態設定頁面標題與 OG 標籤（LINE / Facebook 預覽用）
  const name  = c.name  || '電子訃聞';
  const title = c.title || '永遠的思念';
  const ogTitle = '追思 ' + name + ' 的電子訃聞';
  const ogDesc  = c.message || (title + ' · ' + (c.dates || ''));
  const ogImg   = c.photo || '';

  document.title = ogTitle;

  function setMeta(prop, val, isName) {
    let el = document.querySelector((isName ? 'meta[name="' : 'meta[property="') + prop + '"]');
    if (!el) {
      el = document.createElement('meta');
      el.setAttribute(isName ? 'name' : 'property', prop);
      document.head.appendChild(el);
    }
    el.setAttribute('content', val);
  }
  setMeta('og:title',       ogTitle);
  setMeta('og:description', ogDesc);
  setMeta('og:type',        'website');
  setMeta('og:url',         location.href);
  if (ogImg) setMeta('og:image', ogImg);
  setMeta('description', ogDesc, true);

  const ph  = c.photo ? '<img src="'+c.photo+'" alt="遺照">' : '<div class="ph">👤</div>';
  const msg = c.message ? '<div class="msg">'+c.message+'</div>' : '';

  let famHtml = '';
  if (c.family && c.family.length > 0) {
    const chips = c.family.map(f => {
      const rel  = f.relation ? '<span style="opacity:.6;font-size:10px">'+f.relation+'</span> ' : '';
      const name = f.title ? f.title+(f.name?' <span style="opacity:.55;font-size:11px">'+f.name+'</span>':'') : f.name;
      return '<div class="fc">'+rel+name+'</div>';
    }).join('');
    famHtml = '<div class="div"></div><div class="sect">孝眷代表</div><div class="fam">'+chips+'</div>';
  }

  let infoHtml = '';
  if (c.ceremony) {
    if (c.ceremony.date)    infoHtml += '<div class="ir"><span class="ii">📅</span><span class="it">日期：'+c.ceremony.date+'</span></div>';
    if (c.ceremony.time)    infoHtml += '<div class="ir"><span class="ii">🕙</span><span class="it">時間：'+c.ceremony.time+'</span></div>';
    if (c.ceremony.venue)   infoHtml += '<div class="ir"><span class="ii">🏛️</span><span class="it">地點：'+c.ceremony.venue+'</span></div>';
    if (c.ceremony.address) infoHtml += '<div class="ir"><span class="ii">📍</span><span class="it">地址：'+c.ceremony.address+'</span></div>';
    if (c.ceremony.altar)   infoHtml += '<div class="ir"><span class="ii">🕯️</span><span class="it">設靈處：'+c.ceremony.altar+'</span></div>';
  }

  const mapBtn = (c.ceremony && c.ceremony.address)
    ? '<a class="nav-btn" href="https://maps.google.com/?q='+encodeURIComponent(c.ceremony.address)+'" target="_blank">📍 導航前往告別式現場</a>' : '';
  const su = encodeURIComponent(location.href);
  const co = typeof COMPANY_NAME !== 'undefined' ? COMPANY_NAME : '數位追思服務';

  wrap.innerHTML =
    '<div class="hero"><div class="hero-body">'+
      '<div class="hero-title">'+(c.title||'永遠的思念')+'</div>'+
      '<div class="hero-sub">'+(c.subtitle||'')+'</div>'+
    '</div></div>'+
    '<div class="photo-wrap"><div class="photo-ring">'+ph+'</div></div>'+
    '<div class="body">'+
      '<div class="dname">'+(c.name||'')+'</div>'+
      '<div class="ddates">'+(c.dates||'')+'</div>'+
      msg+
      '<div class="div"></div>'+
      famHtml+
      '<div class="sect">告別式資訊</div>'+
      infoHtml+
    '</div>'+
    mapBtn+
    (c.flower_form ? '<a class="nav-btn flower-btn" href="'+c.flower_form+'" target="_blank">🌸 訂購花禮</a>' : '')+
    '<div class="share-bar">'+
      '<button class="sc" onclick="window.open(\'https://lin.ee/94Hcj4Pv\',\'_blank\')">💬 聯繫禮儀師</button>'+
      '<button class="sc" onclick="navigator.clipboard.writeText(location.href).then(function(){alert(\'連結已複製\')})">🔗 複製連結</button>'+
    '</div>'+
    '<div class="foot">'+co+' · 數位追思服務</div>';
}
</script>
</body>
</html>
