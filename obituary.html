<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子訃聞</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }

/* themes */
body.tw { background: linear-gradient(160deg,#dce8dc,#c8d8c8,#b8ccc0); }
body.tg { background: linear-gradient(160deg,#1e3c24,#2a5030,#1a3020); }
body.tp { background: linear-gradient(160deg,#f0d0d8,#e0b8c4,#c898a8); }
body.td { background: linear-gradient(160deg,#060e1c,#0e1828,#0a1420); }
body.to { background: linear-gradient(160deg,#c89048,#a07030,#785020); }
body.tb { background: linear-gradient(160deg,#e8f0f8,#d0e0f0,#b8d0e8); }
body.tv { background: linear-gradient(160deg,#2a1a3a,#3a2a4a,#1a0a2a); }
body.tr { background: linear-gradient(160deg,#f5e8e0,#e8d0c0,#d8b8a0); }
body.ts { background: linear-gradient(160deg,#1a2a2a,#2a3a3a,#0a1a1a); }
body.tm { background: linear-gradient(160deg,#3a2a1a,#4a3a2a,#2a1a0a); }

.wrap { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

.hero { height: 180px; position: relative; overflow: hidden; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; }
.tw .hero { background: linear-gradient(145deg,#c8d8c8,#a8c0a8); }
.tg .hero { background: linear-gradient(145deg,#2a5a30,#1e4424); }
.tp .hero { background: linear-gradient(145deg,#e8a8b8,#d888a0); }
.td .hero { background: linear-gradient(145deg,#1e3060,#0e1828); }
.to .hero { background: linear-gradient(145deg,#d4a96a,#9a6828); }
.tb .hero { background: linear-gradient(145deg,#4080c0,#2060a0); }
.tv .hero { background: linear-gradient(145deg,#6040a0,#402080); }
.tr .hero { background: linear-gradient(145deg,#c09070,#a07050); }
.ts .hero { background: linear-gradient(145deg,#304030,#102010); }
.tm .hero { background: linear-gradient(145deg,#806040,#604020); }

.hero-deco { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 80px; opacity: 0.15; }
.hero-text { position: relative; z-index: 2; text-align: center; }
.hero-title { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; letter-spacing: 5px; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.hero-sub { font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.75); margin-top: 4px; }
.tp .hero-title, .tp .hero-sub { color: rgba(80,20,40,0.9); }

.photo-wrap { display: flex; justify-content: center; margin-top: -48px; z-index: 10; position: relative; margin-bottom: 12px; }
.photo-ring { width: 96px; height: 96px; border-radius: 50%; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
.tw .photo-ring { border: 5px solid white; background: #c8d8c8; }
.tg .photo-ring { border: 5px solid #4a8a4e; background: #2a5030; }
.tp .photo-ring { border: 5px solid white; background: #f0c0d0; }
.td .photo-ring { border: 5px solid #b8965a; background: #1e3060; }
.to .photo-ring { border: 5px solid #ffe8a8; background: #d4a050; }
.tb .photo-ring { border: 5px solid white; background: #4080c0; }
.tv .photo-ring { border: 5px solid #c0a0ff; background: #4020a0; }
.tr .photo-ring { border: 5px solid #e0c0a0; background: #a07050; }
.ts .photo-ring { border: 5px solid #80c080; background: #204020; }
.tm .photo-ring { border: 5px solid #d4a96a; background: #604020; }
.photo-ring img { width: 100%; height: 100%; object-fit: cover; }
.ph { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 36px; opacity: 0.5; }

.body { flex: 1; padding: 0 24px; }
.name { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 700; letter-spacing: 4px; text-align: center; margin-bottom: 4px; }
.dates { font-size: 12px; letter-spacing: 2px; text-align: center; margin-bottom: 14px; opacity: 0.65; }
.tw .name,.tw .dates { color: #1e3a22; }
.tg .name,.tg .dates { color: rgba(255,255,255,0.95); }
.tp .name,.tp .dates { color: #5e1e34; }
.td .name,.td .dates { color: #d8e4f8; }
.to .name,.to .dates { color: rgba(255,255,255,0.95); }
.tb .name,.tb .dates { color: #1a3060; }
.tv .name,.tv .dates { color: #e0d0ff; }
.tr .name,.tr .dates { color: #4a2a0a; }
.ts .name,.ts .dates { color: #c0ffc0; }
.tm .name,.tm .dates { color: #ffe0c0; }

.msg { border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; line-height: 1.9; text-align: center; font-family: 'Noto Serif TC', serif; font-style: italic; }
.tw .msg { background: rgba(255,255,255,0.45); color: #2a4a2e; border: 1px solid rgba(138,170,138,0.3); }
.tg .msg { background: rgba(255,255,255,0.08); color: rgba(200,240,200,0.9); border: 1px solid rgba(255,255,255,0.12); }
.tp .msg { background: rgba(255,255,255,0.4); color: #7a3448; border: 1px solid rgba(216,120,144,0.3); }
.td .msg { background: rgba(184,150,90,0.08); color: rgba(200,220,255,0.85); border: 1px solid rgba(184,150,90,0.2); }
.to .msg { background: rgba(255,255,255,0.12); color: rgba(255,248,220,0.9); border: 1px solid rgba(255,220,120,0.25); }
.tb .msg { background: rgba(255,255,255,0.4); color: #1a3060; border: 1px solid rgba(64,128,192,0.3); }
.tv .msg { background: rgba(192,160,255,0.1); color: #e0d0ff; border: 1px solid rgba(192,160,255,0.2); }
.tr .msg { background: rgba(255,255,255,0.3); color: #4a2a0a; border: 1px solid rgba(160,112,64,0.3); }
.ts .msg { background: rgba(128,255,128,0.08); color: #c0ffc0; border: 1px solid rgba(128,255,128,0.15); }
.tm .msg { background: rgba(255,200,128,0.1); color: #ffe0c0; border: 1px solid rgba(255,200,128,0.2); }

.div { height: 1px; margin: 0 0 14px; opacity: 0.2; background: currentColor; }
.sect { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-align: center; margin-bottom: 12px; }
.tw .sect { color: #2a4a2e; } .tg .sect { color: rgba(180,240,180,0.9); } .tp .sect { color: #6e2840; }
.td .sect { color: #b8965a; } .to .sect { color: rgba(255,240,160,0.9); } .tb .sect { color: #1a3060; }
.tv .sect { color: #c0a0ff; } .tr .sect { color: #6a3a0a; } .ts .sect { color: #80c080; } .tm .sect { color: #d4a96a; }

.fam { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 14px; }
.fc { padding: 5px 13px; border-radius: 20px; font-size: 12px; letter-spacing: 1px; }
.tw .fc { background: rgba(255,255,255,0.55); color: #2a4a2e; border: 1px solid rgba(100,150,100,0.25); }
.tg .fc { background: rgba(255,255,255,0.08); color: rgba(200,255,200,0.85); border: 1px solid rgba(255,255,255,0.15); }
.tp .fc { background: rgba(255,255,255,0.45); color: #7a3040; border: 1px solid rgba(200,100,130,0.2); }
.td .fc { background: rgba(184,150,90,0.1); color: rgba(200,220,255,0.85); border: 1px solid rgba(184,150,90,0.25); }
.to .fc { background: rgba(255,255,255,0.1); color: rgba(255,248,210,0.9); border: 1px solid rgba(255,220,120,0.25); }
.tb .fc { background: rgba(255,255,255,0.4); color: #1a3060; border: 1px solid rgba(64,128,192,0.3); }
.tv .fc { background: rgba(192,160,255,0.1); color: #e0d0ff; border: 1px solid rgba(192,160,255,0.2); }
.tr .fc { background: rgba(255,255,255,0.3); color: #4a2a0a; border: 1px solid rgba(160,112,64,0.3); }
.ts .fc { background: rgba(128,255,128,0.08); color: #c0ffc0; border: 1px solid rgba(128,255,128,0.2); }
.tm .fc { background: rgba(255,200,128,0.1); color: #ffe0c0; border: 1px solid rgba(255,200,128,0.2); }

.ir { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.7; }
.ii { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
.tw .it { color: #3a5a3e; } .tg .it { color: rgba(200,240,200,0.85); } .tp .it { color: #7a3448; }
.td .it { color: rgba(190,210,245,0.9); } .to .it { color: rgba(255,248,220,0.9); } .tb .it { color: #1a3060; }
.tv .it { color: #e0d0ff; } .tr .it { color: #4a2a0a; } .ts .it { color: #c0ffc0; } .tm .it { color: #ffe0c0; }

.nav-btn { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 16px 24px 0; padding: 13px; border: none; border-radius: 12px; font-family: 'Noto Serif TC', serif; font-size: 14px; letter-spacing: 2px; cursor: pointer; text-decoration: none; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
.tw .nav-btn { background: #2a4a2e; color: white; }
.tg .nav-btn { background: rgba(180,255,180,0.12); color: rgba(200,255,200,0.95); border: 1px solid rgba(200,255,200,0.2); }
.tp .nav-btn { background: #6e2840; color: white; }
.td .nav-btn { background: #b8965a; color: #0e1828; font-weight: 700; }
.to .nav-btn { background: rgba(255,255,255,0.15); color: rgba(255,248,210,0.95); border: 1px solid rgba(255,220,120,0.3); }
.tb .nav-btn { background: #2060a0; color: white; }
.tv .nav-btn { background: #6040a0; color: white; }
.tr .nav-btn { background: #a07050; color: white; }
.ts .nav-btn { background: #204020; color: #c0ffc0; border: 1px solid #80c080; }
.tm .nav-btn { background: #b8965a; color: #2a1a0a; }

.share-bar { display: flex; gap: 8px; padding: 12px 24px; }
.sc { flex: 1; padding: 9px 7px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; justify-content: center; gap: 4px; letter-spacing: 1px; }
.tw .sc,.tp .sc,.tb .sc { background: rgba(255,255,255,0.5); color: #333; }
.tg .sc,.td .sc,.to .sc,.tv .sc,.tr .sc,.ts .sc,.tm .sc { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }

.foot { padding: 12px 24px 32px; text-align: center; font-size: 11px; letter-spacing: 2px; opacity: 0.3; }
.tg .foot,.td .foot,.to .foot,.tv .foot,.ts .foot,.tm .sc { color: white; }
.tw .foot,.tp .foot,.tb .foot,.tr .foot { color: #333; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; color: rgba(255,255,255,0.4); }
.loading p { font-family: 'Noto Serif TC', serif; font-size: 15px; letter-spacing: 3px; }
.err { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; text-align: center; padding: 40px; }
.err h2 { font-family: 'Noto Serif TC', serif; font-size: 20px; letter-spacing: 3px; color: rgba(255,255,255,0.6); }
.err p { font-size: 13px; color: rgba(255,255,255,0.3); line-height: 1.8; }
</style>
</head>
<body class="td">
<div class="loading" id="ls"><div style="font-size:30px;">🕊️</div><p>載入中</p></div>
<div class="wrap" id="wrap" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = document.createElement('script');
cfg.src = 'firebase-config.js';
document.head.appendChild(cfg);
await new Promise(r => cfg.onload = r);

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get('id');
const ls = document.getElementById('ls');
const wrap = document.getElementById('wrap');

if (!id) { showErr('找不到訃聞','請確認連結是否正確'); }
else {
  try {
    const snap = await getDoc(doc(db,'cases',id));
    ls.style.display = 'none';
    wrap.style.display = 'flex';
    if (!snap.exists()) showErr('此訃聞不存在','連結可能已失效');
    else render({id,...snap.data()});
  } catch(e) {
    showErr('載入失敗', e.message);
  }
}

function showErr(t,m) {
  ls.style.display = 'none';
  wrap.style.display = 'flex';
  wrap.innerHTML = `<div class="err"><div style="font-size:46px">🕊️</div><h2>${t}</h2><p>${m}</p></div>`;
}

const tmap = {white:'tw',green:'tg',pink:'tp',dark:'td',gold:'to',blue:'tb',violet:'tv',warm:'tr',sage:'ts',mocha:'tm'};
const deco = {tw:'🌿🌸🌿',tg:'🌿🌱🌿',tp:'🌸🌷🌸',td:'✦⋆✦',to:'❀✿❀',tb:'🌊💙🌊',tv:'✨🌙✨',tr:'🍂🌾🍂',ts:'🌲🍃🌲',tm:'☕🍵☕'};

function render(c) {
  const tc = tmap[c.theme||'dark']||'td';
  document.body.className = tc;
  document.title = (c.name||'電子訃聞') + ' — ' + (c.title||'永遠的思念');

  const ph = c.photo ? `<img src="${c.photo}" alt="遺照">` : `<div class="ph">👤</div>`;
  const msg = c.message ? `<div class="msg">${c.message}</div>` : '';
  const fam = (c.family&&c.family.length) ? `
    <div class="div"></div>
    <div class="sect">孝眷代表</div>
    <div class="fam">${c.family.map(f=>`<div class="fc">${f.relation?`<span style="opacity:.6;font-size:10px;">${f.relation}</span> `:''}${f.title||f.name}${f.title&&f.name?` <span style="opacity:.55;font-size:11px;">${f.name}</span>`:''}</div>`).join('')}</div>` : '';
  const info = [
    c.ceremony?.date && {i:'📅',t:`日期：${c.ceremony.date}`},
    c.ceremony?.time && {i:'🕙',t:`時間：${c.ceremony.time}`},
    c.ceremony?.venue && {i:'🏛️',t:`地點：${c.ceremony.venue}`},
    c.ceremony?.address && {i:'📍',t:`地址：${c.ceremony.address}`},
  ].filter(Boolean).map(r=>`<div class="ir"><span class="ii">${r.i}</span><span class="it">${r.t}</span></div>`).join('');
  const mapUrl = c.ceremony?.address ? `https://maps.google.com/?q=${encodeURIComponent(c.ceremony.address)}` : null;
  const su = encodeURIComponent(location.href);
  const co = typeof COMPANY_NAME!=='undefined' ? COMPANY_NAME : '數位追思服務';

  wrap.innerHTML = `
    <div class="hero">
      <div class="hero-deco">${deco[tc]||'🌸'}</div>
      <div class="hero-text">
        <div class="hero-title">${c.title||'永遠的思念'}</div>
        <div class="hero-sub">${c.subtitle||''}</div>
      </div>
    </div>
    <div class="photo-wrap"><div class="photo-ring">${ph}</div></div>
    <div class="body">
      <div class="name">${c.name||''}</div>
      <div class="dates">${c.dates||''}</div>
      ${msg}
      <div class="div"></div>
      ${fam}
      <div class="sect">告別式資訊</div>
      ${info}
    </div>
    ${mapUrl?`<a class="nav-btn" href="${mapUrl}" target="_blank">📍 導航前往告別式現場</a>`:''}
    <div class="share-bar">
      <button class="sc" onclick="window.open('https://social-plugins.line.me/lineit/share?url=${su}','_blank')">💬 LINE 分享</button>
      <button class="sc" onclick="navigator.clipboard.writeText(location.href).then(()=>alert('連結已複製'))">🔗 複製連結</button>
    </div>
    <div class="foot">${co} · 數位追思服務</div>
  `;
}
</script>
</body>
</html>
